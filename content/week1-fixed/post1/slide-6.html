<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post 1 - Slide 6 (Fixed)</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1024px;
            height: 1536px;
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .cta-card {
            width: 840px;
            background: #1a1a1a;
            border: 3px solid #ff6b35;
            padding: 80px 60px;
            text-align: center;
            font-family: 'Space Mono', monospace;
        }
        .url {
            font-size: 64px;
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 50px;
            letter-spacing: -1px;
        }
        .divider {
            border: none;
            border-top: 3px dashed #333;
            margin: 0 0 50px 0;
        }
        .feature {
            font-size: 34px;
            color: #ccc;
            margin-bottom: 22px;
            font-weight: 400;
        }
        .feature .check {
            color: #ff6b35;
            margin-right: 12px;
        }
        .divider2 {
            border: none;
            border-top: 3px dashed #333;
            margin: 40px 0;
        }
        .footer {
            font-size: 36px;
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        /* Receipt paper effect */
        .receipt-top {
            width: 840px;
            height: 30px;
            background: repeating-linear-gradient(
                90deg,
                #1a1a1a 0px,
                #1a1a1a 15px,
                transparent 15px,
                transparent 20px
            );
            margin-bottom: -3px;
        }
        .receipt-bottom {
            width: 840px;
            height: 30px;
            background: repeating-linear-gradient(
                90deg,
                #1a1a1a 0px,
                #1a1a1a 15px,
                transparent 15px,
                transparent 20px
            );
            margin-top: -3px;
        }
    </style>
</head>
<body>
    <div class="receipt-top"></div>
    <div class="cta-card">
        <div class="url">fairvein.com</div>
        <hr class="divider">
        <div class="feature"><span class="check">✓</span> 200+ brands indexed</div>
        <div class="feature"><span class="check">✓</span> Active boycott tracker</div>
        <div class="feature"><span class="check">✓</span> Free forever</div>
        <hr class="divider2">
        <div class="footer">No signup required</div>
    </div>
    <div class="receipt-bottom"></div>
</body>
</html>
