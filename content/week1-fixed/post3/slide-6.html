<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post 3 - Slide 6 (Fixed)</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1024px;
            height: 1536px;
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .cta-card {
            width: 840px;
            background: #1a1a1a;
            border: 3px solid #ff6b35;
            padding: 80px 60px;
            text-align: center;
            font-family: 'Space Mono', monospace;
        }
        .title {
            font-family: 'Inter', sans-serif;
            font-size: 56px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            line-height: 1.3;
            margin-bottom: 40px;
        }
        .title .highlight {
            color: #ff6b35;
        }
        .divider {
            border: none;
            border-top: 3px dashed #333;
            margin: 0 0 40px 0;
        }
        .url {
            font-size: 60px;
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }
        .divider2 {
            border: none;
            border-top: 3px dashed #333;
            margin: 0 0 30px 0;
        }
        .tagline {
            font-size: 30px;
            color: #888;
            font-weight: 400;
            line-height: 1.6;
        }
        .tagline span {
            color: #ff6b35;
        }
    </style>
</head>
<body>
    <div class="cta-card">
        <div class="title">Check <span class="highlight">before</span><br>you buy</div>
        <hr class="divider">
        <div class="url">fairvein.com</div>
        <hr class="divider2">
        <div class="tagline"><span>✓</span> Free · <span>✓</span> No signup · <span>✓</span> 200+ brands</div>
    </div>
</body>
</html>
