<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1 - MAC Reveal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FFE8D6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }
        /* Subtle texture overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.03"/></svg>');
            pointer-events: none;
        }
        .container {
            text-align: center;
            padding: 80px 60px;
            position: relative;
            z-index: 1;
        }
        .hook {
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            font-weight: 700;
            color: #2C1810;
            line-height: 1.1;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.5);
        }
        .subtext {
            font-size: 48px;
            color: #5C4033;
            font-weight: 600;
            line-height: 1.4;
        }
        .accent {
            display: inline-block;
            background: #D2691E;
            color: #FFF8F0;
            padding: 8px 24px;
            border-radius: 8px;
            transform: rotate(-1deg);
            box-shadow: 3px 3px 0 rgba(44, 24, 16, 0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hook">Wait...</div>
        <div class="subtext">MAC is owned by <span class="accent">WHO?!</span></div>
    </div>
</body>
</html>
