<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 5 - MAC Reveal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FFE8D6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 80px;
        }
        .content {
            max-width: 900px;
        }
        .question {
            font-family: 'Playfair Display', serif;
            font-size: 88px;
            font-weight: 700;
            color: #2C1810;
            margin-bottom: 60px;
            line-height: 1.2;
        }
        .cta-box {
            background: white;
            border: 3px solid #2C1810;
            padding: 60px 50px;
            box-shadow: 6px 6px 0 rgba(210, 105, 30, 0.3);
            transform: rotate(0.5deg);
        }
        .tool-name {
            font-family: 'Playfair Display', serif;
            font-size: 76px;
            font-weight: 700;
            color: #D2691E;
            margin-bottom: 30px;
        }
        .tagline {
            font-size: 44px;
            color: #5C4033;
            font-weight: 600;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="question">Check Before You Buy</div>
        <div class="cta-box">
            <div class="tool-name">EthicalCart</div>
            <div class="tagline">Know who you're really paying</div>
        </div>
    </div>
</body>
</html>
