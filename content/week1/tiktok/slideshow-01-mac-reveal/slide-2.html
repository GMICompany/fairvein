<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 2 - MAC Reveal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1920px;
            background: #FFF8F0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .receipt {
            width: 900px;
            background: white;
            border: 3px solid #2C1810;
            padding: 60px 50px;
            box-shadow: 8px 8px 0 rgba(210, 105, 30, 0.3);
            transform: rotate(-0.5deg);
        }
        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 96px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }
        .divider {
            border: none;
            border-top: 3px dashed #2C1810;
            margin: 30px 0;
        }
        .label {
            font-size: 36px;
            color: #5C4033;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .value {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #D2691E;
            margin-bottom: 40px;
        }
        .footer {
            font-size: 32px;
            color: #8B7355;
            font-style: italic;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="receipt">
        <div class="brand-name">MAC</div>
        <div class="label">Parent Company:</div>
        <div class="value">Estée Lauder</div>
        <hr class="divider">
        <div class="footer">29 brands under one roof</div>
    </div>
</body>
</html>
