<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 3 - MAC Reveal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #FFE8D6 0%, #FFF8F0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            padding: 80px;
        }
        .list {
            background: white;
            border: 3px solid #2C1810;
            padding: 70px 60px;
            box-shadow: 6px 6px 0 rgba(210, 105, 30, 0.2);
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 700;
            color: #2C1810;
            margin-bottom: 50px;
            text-align: center;
        }
        .brand-item {
            font-size: 44px;
            color: #5C4033;
            margin-bottom: 28px;
            padding-left: 20px;
            border-left: 6px solid #D2691E;
            font-weight: 600;
        }
        .more {
            font-size: 40px;
            color: #8B7355;
            font-style: italic;
            margin-top: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="list">
        <div class="title">All Estée Lauder:</div>
        <div class="brand-item">MAC</div>
        <div class="brand-item">Clinique</div>
        <div class="brand-item">Bobbi Brown</div>
        <div class="brand-item">La Mer</div>
        <div class="brand-item">Tom Ford Beauty</div>
        <div class="brand-item">Too Faced</div>
        <div class="more">+ 23 more brands</div>
    </div>
</body>
</html>
