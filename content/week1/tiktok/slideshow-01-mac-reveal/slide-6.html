<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 6 - MAC Reveal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1080px;
            height: 1920px;
            background: #FFF8F0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 100px;
        }
        .receipt {
            width: 100%;
            background: white;
            border: 3px solid #2C1810;
            padding: 80px 60px;
            box-shadow: 8px 8px 0 rgba(210, 105, 30, 0.3);
        }
        .url {
            font-family: 'Inter', monospace;
            font-size: 56px;
            color: #D2691E;
            font-weight: 700;
            margin-bottom: 50px;
            letter-spacing: -1px;
        }
        .divider {
            border: none;
            border-top: 3px dashed #2C1810;
            margin: 40px 0;
        }
        .feature {
            font-size: 46px;
            color: #5C4033;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .checkmark {
            color: #D2691E;
            margin-right: 15px;
        }
        .footer {
            font-size: 38px;
            color: #2C1810;
            font-weight: 700;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="receipt">
        <div class="url">ethicalcart.com</div>
        <hr class="divider">
        <div class="feature"><span class="checkmark">✓</span> 200+ brands indexed</div>
        <div class="feature"><span class="checkmark">✓</span> Active boycott tracker</div>
        <div class="feature"><span class="checkmark">✓</span> Free forever</div>
        <hr class="divider">
        <div class="footer">No signup required</div>
    </div>
</body>
</html>
