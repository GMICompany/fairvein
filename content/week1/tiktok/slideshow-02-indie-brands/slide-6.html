<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 6 - Indie Brands</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1920px; background: #FFF8F0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; text-align: center; padding: 100px;
        }
        .cta {
            background: white; border: 3px solid #2C1810;
            padding: 80px 70px; box-shadow: 8px 8px 0 rgba(210, 105, 30, 0.3);
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 72px; font-weight: 700; color: #2C1810;
            margin-bottom: 40px; line-height: 1.2;
        }
        .url {
            font-size: 58px; color: #D2691E; font-weight: 700;
            font-family: monospace; letter-spacing: -1px; margin-bottom: 50px;
        }
        .tagline {
            font-size: 46px; color: #5C4033; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="cta">
        <div class="title">Search any brand. Know the truth.</div>
        <div class="url">ethicalcart.com</div>
        <div class="tagline">Free. No signup.</div>
    </div>
</body>
</html>
