<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 5 - Indie Brands</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1920px;
            background: linear-gradient(135deg, #2C1810 0%, #5C4033 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; text-align: center; padding: 100px;
        }
        .message {
            font-family: 'Playfair Display', serif;
            font-size: 96px; font-weight: 700; color: #FFF8F0;
            line-height: 1.2; margin-bottom: 60px;
        }
        .stat {
            background: #D2691E; color: white;
            padding: 40px 50px; border-radius: 12px;
            font-size: 64px; font-weight: 700;
            box-shadow: 8px 8px 0 rgba(255, 248, 240, 0.2);
        }
    </style>
</head>
<body>
    <div>
        <div class="message">8 companies own most brands you love</div>
        <div class="stat">They're hiding in plain sight</div>
    </div>
</body>
</html>
