<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1 - Indie Brands</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1920px;
            background: linear-gradient(135deg, #FFE8D6 0%, #FFF8F0 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; text-align: center; padding: 80px;
        }
        .hook {
            font-family: 'Playfair Display', serif;
            font-size: 110px; font-weight: 700; color: #2C1810;
            line-height: 1.1; margin-bottom: 50px;
        }
        .subtext {
            font-size: 52px; color: #5C4033; font-weight: 600; line-height: 1.3;
        }
        .highlight { background: #D2691E; color: white; padding: 5px 20px;
            border-radius: 6px; transform: rotate(-0.5deg); display: inline-block; }
    </style>
</head>
<body>
    <div>
        <div class="hook">Brands you thought were indie...</div>
        <div class="subtext">but are actually <span class="highlight">owned by giants</span></div>
    </div>
</body>
</html>
