<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 3 - Indie Brands</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1920px; background: #FFF8F0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; padding: 80px;
        }
        .card {
            background: white; border: 3px solid #2C1810;
            padding: 70px 60px; box-shadow: 6px 6px 0 rgba(210, 105, 30, 0.3);
            transform: rotate(-0.5deg);
        }
        .brand { font-family: 'Playfair Display', serif; font-size: 88px;
            font-weight: 700; color: #2C1810; margin-bottom: 30px; }
        .arrow { font-size: 72px; color: #D2691E; margin: 30px 0; }
        .parent { font-size: 64px; color: #D2691E; font-weight: 700; }
        .label { font-size: 36px; color: #8B7355; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">NYX</div>
        <div class="label">Actually owned by</div>
        <div class="arrow">↓</div>
        <div class="parent">L'Oréal</div>
    </div>
</body>
</html>
