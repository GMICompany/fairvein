<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 3 - Before You Buy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1920px;
            background: linear-gradient(135deg, #FFE8D6 0%, #FFF8F0 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; text-align: center; padding: 80px;
        }
        .solution {
            background: white; border: 3px solid #2C1810;
            padding: 80px 70px; box-shadow: 6px 6px 0 rgba(210, 105, 30, 0.3);
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 76px; font-weight: 700; color: #2C1810;
            margin-bottom: 50px;
        }
        .step {
            font-size: 46px; color: #5C4033; margin-bottom: 30px;
            line-height: 1.4; font-weight: 600;
        }
        .emoji { font-size: 60px; margin-right: 15px; }
        .highlight { color: #D2691E; }
    </style>
</head>
<body>
    <div class="solution">
        <div class="title">The Solution:</div>
        <div class="step"><span class="emoji">📱</span> Open EthicalCart</div>
        <div class="step"><span class="emoji">🔍</span> Search brand name</div>
        <div class="step"><span class="emoji">✓</span> See parent company + boycott status</div>
        <div class="step"><span class="emoji highlight">💚</span> Shop with confidence</div>
    </div>
</body>
</html>
