<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 2 - Before You Buy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1920px; background: #2C1810;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; padding: 80px;
        }
        .scenario {
            background: #FFF8F0; border: 4px solid #D2691E;
            padding: 80px 70px; text-align: center;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 68px; font-weight: 700; color: #D2691E;
            margin-bottom: 50px;
        }
        .step {
            font-size: 44px; color: #2C1810; margin-bottom: 30px;
            line-height: 1.4; font-weight: 600;
        }
        .emoji { font-size: 60px; margin-right: 15px; }
    </style>
</head>
<body>
    <div class="scenario">
        <div class="title">The Problem:</div>
        <div class="step"><span class="emoji">🛍️</span> See cute product</div>
        <div class="step"><span class="emoji">💳</span> Buy it</div>
        <div class="step"><span class="emoji">😱</span> Find out it's owned by company you're boycotting</div>
        <div class="step"><span class="emoji">😔</span> Too late</div>
    </div>
</body>
</html>
