<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Carousel 2 - Cover</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1080px;
            background: linear-gradient(135deg, #2C1810 0%, #5C4033 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; text-align: center; padding: 80px;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 88px; font-weight: 700; color: #FFF8F0;
            line-height: 1.1; margin-bottom: 40px;
        }
        .subtitle {
            font-size: 44px; color: #FFE8D6; font-weight: 600;
            line-height: 1.3;
        }
        .highlight { color: #D2691E; }
    </style>
</head>
<body>
    <div>
        <div class="title">Why We're Boycotting</div>
        <div class="subtitle">A timeline with <span class="highlight">receipts</span></div>
    </div>
</body>
</html>
