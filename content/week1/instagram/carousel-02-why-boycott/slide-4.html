<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Carousel 2 - Impact</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1080px;
            background: linear-gradient(135deg, #FFE8D6 0%, #FFF8F0 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; text-align: center; padding: 80px;
        }
        .impact {
            background: white; border: 3px solid #2C1810;
            padding: 70px 60px; box-shadow: 8px 8px 0 rgba(210, 105, 30, 0.3);
        }
        .stat {
            font-size: 120px; font-weight: 700; color: #D2691E;
            margin-bottom: 30px;
        }
        .label {
            font-family: 'Playfair Display', serif;
            font-size: 52px; font-weight: 700; color: #2C1810;
            margin-bottom: 40px; line-height: 1.2;
        }
        .message {
            font-size: 36px; color: #5C4033; font-weight: 600;
            line-height: 1.5; margin-top: 40px;
            padding-top: 40px; border-top: 3px dashed #2C1810;
        }
    </style>
</head>
<body>
    <div class="impact">
        <div class="stat">29</div>
        <div class="label">brands to avoid if you're boycotting Estée Lauder</div>
        <div class="message">Check them all on EthicalCart before your next purchase</div>
    </div>
</body>
</html>
