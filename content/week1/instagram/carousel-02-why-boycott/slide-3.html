<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Carousel 2 - Timeline 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1080px; background: #FFF8F0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; padding: 70px;
        }
        .timeline {
            background: white; border: 3px solid #2C1810;
            padding: 60px 50px; width: 100%; height: 100%;
            box-shadow: 6px 6px 0 rgba(210, 105, 30, 0.3);
        }
        .date {
            font-family: 'Playfair Display', serif;
            font-size: 56px; font-weight: 700; color: #D2691E;
            margin-bottom: 25px;
        }
        .event {
            font-size: 38px; color: #2C1810; font-weight: 600;
            margin-bottom: 30px; line-height: 1.4;
        }
        .source {
            font-size: 28px; color: #8B7355;
            font-style: italic; padding-top: 25px;
            border-top: 2px dashed #2C1810; margin-top: 30px;
        }
        .divider {
            height: 3px; background: #D2691E;
            margin: 40px 0; opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="timeline">
        <div class="date">February 2026</div>
        <div class="event">Board member's Epstein connections resurface in investigative report</div>
        <div class="divider"></div>
        <div class="date">March 2026</div>
        <div class="event">Labor violations at contracted manufacturing facilities exposed</div>
        <div class="source">Sources: The Guardian, Business & Human Rights Resource Centre</div>
    </div>
</body>
</html>
