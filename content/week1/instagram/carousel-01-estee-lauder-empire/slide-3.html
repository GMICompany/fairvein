<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Carousel 1 - Full List</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1080px; background: #FFF8F0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; padding: 60px;
        }
        .list-container {
            background: white; border: 3px solid #2C1810;
            padding: 50px 40px; width: 100%; height: 100%;
            box-shadow: 8px 8px 0 rgba(210, 105, 30, 0.3);
            overflow: hidden;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 52px; font-weight: 700; color: #D2691E;
            margin-bottom: 35px; text-align: center;
            border-bottom: 3px dashed #2C1810; padding-bottom: 25px;
        }
        .columns {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px 30px;
        }
        .brand {
            font-size: 26px; color: #2C1810; font-weight: 600;
            padding-left: 15px; border-left: 4px solid #D2691E;
        }
        .footer {
            margin-top: 35px; padding-top: 25px;
            border-top: 3px dashed #2C1810;
            text-align: center; font-size: 28px; color: #8B7355;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="list-container">
        <div class="title">All 29 Brands</div>
        <div class="columns">
            <div class="brand">MAC</div>
            <div class="brand">Clinique</div>
            <div class="brand">Bobbi Brown</div>
            <div class="brand">La Mer</div>
            <div class="brand">Tom Ford Beauty</div>
            <div class="brand">Too Faced</div>
            <div class="brand">Aveda</div>
            <div class="brand">The Ordinary</div>
            <div class="brand">Bumble and bumble</div>
            <div class="brand">Smashbox</div>
            <div class="brand">Origins</div>
            <div class="brand">GLAMGLOW</div>
            <div class="brand">Jo Malone</div>
            <div class="brand">Darphin</div>
            <div class="brand">Dr. Jart+</div>
            <div class="brand">Frederic Malle</div>
            <div class="brand">Le Labo</div>
            <div class="brand">Editions de Parfums</div>
            <div class="brand">By Kilian</div>
            <div class="brand">BECCA</div>
        </div>
        <div class="footer">+ 9 more luxury brands</div>
    </div>
</body>
</html>
