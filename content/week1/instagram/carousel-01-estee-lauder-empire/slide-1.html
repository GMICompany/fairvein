<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Carousel 1 - Cover</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1080px;
            background: linear-gradient(135deg, #FFF8F0 0%, #FFE8D6 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; text-align: center;
        }
        .cover {
            padding: 80px;
        }
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 96px; font-weight: 700; color: #2C1810;
            line-height: 1.1; margin-bottom: 40px;
        }
        .subtitle {
            font-size: 42px; color: #5C4033; font-weight: 600;
            line-height: 1.4;
        }
        .accent { color: #D2691E; }
        .number {
            font-size: 140px; font-weight: 700; color: #D2691E;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="cover">
        <div class="number">29</div>
        <div class="title">The Estée Lauder Empire</div>
        <div class="subtitle">How one company controls your beauty routine</div>
    </div>
</body>
</html>
