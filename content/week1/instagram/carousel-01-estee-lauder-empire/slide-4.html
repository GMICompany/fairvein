<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Carousel 1 - CTA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1080px; height: 1080px;
            background: linear-gradient(135deg, #FFE8D6 0%, #FFF8F0 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; text-align: center; padding: 80px;
        }
        .cta-box {
            background: white; border: 3px solid #2C1810;
            padding: 80px 70px; box-shadow: 8px 8px 0 rgba(210, 105, 30, 0.3);
        }
        .message {
            font-family: 'Playfair Display', serif;
            font-size: 64px; font-weight: 700; color: #2C1810;
            line-height: 1.2; margin-bottom: 50px;
        }
        .highlight { color: #D2691E; }
        .url {
            font-size: 52px; color: #D2691E; font-weight: 700;
            font-family: monospace; letter-spacing: -1px; margin-bottom: 40px;
        }
        .features {
            font-size: 36px; color: #5C4033; line-height: 1.8;
        }
        .check { color: #D2691E; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="cta-box">
        <div class="message">Know who you're <span class="highlight">really</span> paying</div>
        <div class="url">ethicalcart.com</div>
        <div class="features">
            <div><span class="check">✓</span> 200+ brands</div>
            <div><span class="check">✓</span> Active boycotts</div>
            <div><span class="check">✓</span> Free forever</div>
        </div>
    </div>
</body>
</html>
